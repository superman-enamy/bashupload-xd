name = "bashupload-xd"
main = "src/index.js"
compatibility_date = "2025-08-16"

# 启用workers.dev
workers_dev = true

# 绑定域名
routes = [
	{ pattern = "bashupload.app", custom_domain = true }
]

# R2 存储桶绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "bashupload"

# 下载次数统计（可选）：KV 命名空间
# 启用步骤 / To enable download counting:
#   1) 运行 / run:  wrangler kv namespace create DOWNLOAD_COUNTS
#   2) 把输出的 id 填到下面的 id，并取消注释这三行 / paste the returned id below and uncomment
# [[kv_namespaces]]
# binding = "DOWNLOAD_COUNTS"
# id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# 环境变量
[vars]
MAX_UPLOAD_SIZE = "5368709120"
MAX_AGE = "3600"
SHORT_URL_SERVICE = "https://suosuo.de/short"
PASSWORD = "8458940626"
MAX_AGE_FOR_MULTIDOWNLOAD = "86400"
NO_CLEANUP = "false"
# 设为 "true" 可彻底关闭网页端：浏览器只能下载，无法上传（命令行 CLI 上传不受影响）
DISABLE_WEB = "false"
# 设为 "true" 可关闭“永不过期”上传功能
DISABLE_NO_EXPIRE = "false"

# 静态文件
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/*"]

# 开启日志
[observability.logs]
enabled = true

# 定时任务 - 每5分钟执行一次清理
[triggers]
crons = ["*/5 * * * *"]



