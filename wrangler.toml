name = "bashupload-xd"
main = "src/index.js"
compatibility_date = "2025-08-16"

# 启用workers.dev
workers_dev = true

# 绑定自定义域名（可选 / optional）
# 仅当该域名是你自己 Cloudflare 账号下的一个 Zone 时才可用。
# 上游的 "bashupload.app" 不在你的账号中，启用它会导致部署报错：
#   Can't infer zone from route ... [code: 10082]
# 默认通过 workers_dev (*.workers.dev) 访问。要用自己的域名，请替换下方域名并取消注释：
# routes = [
# 	{ pattern = "your-domain.com", custom_domain = true }
# ]

# R2 存储桶绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "bashupload"

# 下载次数统计：KV 命名空间 / Download counter KV namespace
[[kv_namespaces]]
binding = "DOWNLOAD_COUNTS"
id = "b7acbde26b8847a7b9c8bc164ac978ee"

# 环境变量
[vars]
MAX_UPLOAD_SIZE = "5368709120"
MAX_AGE = "3600"
SHORT_URL_SERVICE = "https://suosuo.de/short"
PASSWORD = "8458940626"
MAX_AGE_FOR_MULTIDOWNLOAD = "86400"
NO_CLEANUP = "false"
# 默认彻底关闭网页端：浏览器只能下载，无法上传（命令行 CLI 上传不受影响）。设为 "false" 可重新开启网页上传。
DISABLE_WEB = "true"
# 设为 "true" 可关闭“永不过期”上传功能
DISABLE_NO_EXPIRE = "false"

# 静态文件
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/*"]

# 开启日志
[observability.logs]
enabled = true

# 定时任务 - 每5分钟执行一次清理
[triggers]
crons = ["*/5 * * * *"]



